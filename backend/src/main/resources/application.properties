# ============================================================
# SRAMS Application Configuration
# ============================================================

spring.application.name=srams-backend

spring.profiles.active=qa

# --- Database ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- JWT ---
srams.jwt.secret=zL70zw9GLMd88k1FP/NqXBouZm1p4LGwAIr4dgjtrZ8=
srams.jwt.expiration-ms=86400000
srams.jwt.refresh-expiration-ms=604800000

# --- File Upload ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
srams.upload.dir=uploads/transfer-documents

# --- Springdoc / Swagger ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
